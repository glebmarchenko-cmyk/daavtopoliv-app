<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ДА автополив</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#8b6b3f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ДА автополив" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f1e8;
      color: #2f2a24;
      padding: 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 30px 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 16px;
      color: #6f655a;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 17px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-primary {
      background: #8b6b3f;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: #8b6b3f;
      border: 2px solid #8b6b3f;
    }

    .services {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .services h2 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    .service-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .service-item:last-child {
      border-bottom: none;
    }

    .contacts {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .contacts h2 {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="hero">
      <h1>ДА автополив</h1>
      <p class="subtitle">
        Премиальные системы автополива под ключ
      </p>

      <a class="btn btn-primary" href="https://max.ru/u/f9LHodD0cOJqcSXvWud7ovTfTMkCtQk4Cwhu7j29Et6NJNkt8e-JeLGZksU" target="_blank">
        Связаться в MAX
      </a>

      <a class="btn btn-secondary" href="https://www.instagram.com/dmitriy.marchenko_?igsh=Z24yaGg3c3Fhd2p0" target="_blank">
        Instagram
      </a>
    </div>

    <div class="services">
      <h2>Наши услуги</h2>
      <div class="service-item">Проектирование систем автополива</div>
      <div class="service-item">Монтаж под ключ</div>
      <div class="service-item">Сезонное обслуживание</div>
      <div class="service-item">Настройка и ремонт</div>
      <div class="service-item">Консультация по участку</div>
    </div>

    <div class="contacts">
      <h2>Связь</h2>
      <a class="btn btn-primary" href="https://max.ru/u/f9LHodD0cOJqcSXvWud7ovTfTMkCtQk4Cwhu7j29Et6NJNkt8e-JeLGZksU" target="_blank">
        Написать в MAX
      </a>

      <a class="btn btn-secondary" href="https://www.instagram.com/dmitriy.marchenko_?igsh=Z24yaGg3c3Fhd2p0" target="_blank">
        Открыть Instagram
      </a>
    </div>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then((registration) => {
            console.log("Service Worker registered:", registration);
          })
          .catch((error) => {
            console.log("Service Worker registration failed:", error);
          });
      });
    }
  </script>
</body>
</html>
